name: Create Release

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: write
  packages: write

jobs:
  testing:
    name: Testing
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: stable
      id: go

    - name: Check out code
      uses: actions/checkout@v6

    - name: Check
      run: make check

  release:
    name: Release
    needs: [testing]
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: stable
      id: go

    - name: Check out code
      uses: actions/checkout@v6

    - uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: 'latest'
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
